<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Not Found - QRkartu</title>
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #1E1F18;
            color: #E8E5DC;
            font-family: Inter, Arial, sans-serif;
            text-align: center;
            padding: 24px;
        }
        .box {
            max-width: 560px;
            border: 1px solid #2C2D25;
            border-radius: 16px;
            padding: 28px;
            background: #181914;
        }
        .emoji { font-size: 52px; margin-bottom: 10px; }
        h1 { margin: 0 0 10px; font-size: 28px; }
        p { margin: 0; color: #8A8878; font-size: 15px; }
        .logo {
            margin-top: 18px;
            opacity: 0.9;
        }
        .logo img {
            height: 28px;
            width: auto;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="emoji">😢</div>
        <h1>Upps, what you search not exist anymore</h1>
        <p>The content may have been deleted, expired, or is no longer available.</p>
        <div class="logo">
            <img src="/static/assets/img/mainlogo.png" alt="QRkartu">
        </div>
    </div>
</body>
</html>

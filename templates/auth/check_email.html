<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRkartu - Check Your Email</title>
    <style>
        :root {
            --primary-blue: #EBA81B;
            --primary-hover: #d4941a;
            --text-dark: #E8E5DC;
            --text-muted: #8A8878;
            --border-color: #2C2D25;
            --input-bg: #1E1F18;
            --btn-disabled: #3A3B30;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            display: flex;
            min-height: 100vh;
            background-color: #1E1F18;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .auth-container {
            width: 100%;
            max-width: 450px;
            padding: 40px;
            background: #181914;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            text-align: center;
        }

        .header-logo {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 24px;
            font-weight: 800;
            color: var(--text-dark);
            text-decoration: none;
            margin-bottom: 24px;
        }

        .logo-icon {
            background-color: var(--primary-blue);
            color: white;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 800;
        }

        h1 {
            font-size: 24px;
            color: var(--text-dark);
            margin-bottom: 16px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 15px;
            line-height: 1.5;
            margin-bottom: 32px;
        }

        .btn-submit {
            display: block;
            width: 100%;
            padding: 14px;
            background-color: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            font-size: 14px;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-submit:hover {
            background-color: var(--primary-hover);
        }

        .email-icon {
            font-size: 64px;
            margin-bottom: 24px;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <a href="/" class="header-logo">
            <span class="logo-icon">QR</span> QRkartu
        </a>
        <div class="email-icon">✉️</div>
        <h1>Check your email</h1>
        <p class="subtitle">We've sent a verification link to your email address. Please check your inbox and click the link to verify your account before logging in.</p>
        
        <a href="/login" class="btn-submit">Proceed to Login</a>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — QR Kartu</title>
    <link rel="icon" type="image/x-icon" href="/static/assets/img/favicon_io/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/assets/img/favicon_io/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/assets/img/favicon_io/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/assets/img/favicon_io/favicon-16x16.png">
    <link rel="manifest" href="/static/assets/img/favicon_io/site.webmanifest">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #111209 0%, #181914 60%, #111209 100%);
            display: flex; align-items: center; justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: #1E1F18;
            border-radius: 16px;
            padding: 48px 40px;
            width: 100%; max-width: 420px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.35);
        }
        .logo-area {
            text-align: center;
            margin-bottom: 32px;
        }
        .logo-icon {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, #111209, #181914);
            border-radius: 14px;
            display: inline-flex; align-items: center; justify-content: center;
            font-size: 24px; color: #EBA81B;
            margin-bottom: 16px;
        }
        .logo-title { font-size: 22px; font-weight: 700; color: #0b132b; }
        .logo-sub   { font-size: 13px; color: #8A8878; margin-top: 4px; }

        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 13px; font-weight: 500; color: #E8E5DC; margin-bottom: 6px; }
        input[type="email"], input[type="password"] {
            width: 100%; padding: 11px 14px;
            border: 1px solid #2C2D25; border-radius: 8px;
            font-size: 14px; font-family: inherit;
            outline: none; transition: border-color .2s;
        }
        input:focus { border-color: #EBA81B; box-shadow: 0 0 0 3px rgba(0,168,150,.12); }

        .btn-login {
            width: 100%; padding: 12px;
            background: #EBA81B; color: white;
            border: none; border-radius: 8px;
            font-size: 15px; font-weight: 600; font-family: inherit;
            cursor: pointer; transition: background .2s;
            margin-top: 8px;
        }
        .btn-login:hover { background: #d4941a; }

        .error-box {
            background: #fef2f2; border: 1px solid #fca5a5; color: #b91c1c;
            padding: 10px 14px; border-radius: 8px;
            font-size: 13px; margin-bottom: 20px; text-align: center;
        }
        .back-link {
            text-align: center; margin-top: 24px;
            font-size: 13px; color: #8A8878;
        }
        .back-link a { color: #EBA81B; text-decoration: none; font-weight: 500; }
        .back-link a:hover { text-decoration: underline; }

        .divider {
            border: none; border-top: 1px solid #252619;
            margin: 28px 0 20px;
        }
        .panel-badge {
            display: inline-block; background: #f0fdf4; color: #065f46;
            border: 1px solid #6ee7b7; border-radius: 20px;
            font-size: 11px; font-weight: 600; padding: 3px 10px;
            letter-spacing: .5px; text-transform: uppercase;
            margin-bottom: 20px;
        }

        /* Shiny Text Animation */
        .shiny-text {
            background: linear-gradient(
                120deg,
                #0b132b 0%,
                #0b132b 40%,
                #EBA81B 50%,
                #0b132b 60%,
                #0b132b 100%
            );
            background-size: 200% auto;
            color: #0b132b;
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: shine 3s linear infinite;
        }

        @keyframes shine {
            to {
                background-position: 200% center;
            }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-area" style="display: flex; flex-direction: column; align-items: center;">
            <div style="display: flex; align-items: center; margin-bottom: 8px;">
                <img src="/static/assets/img/mainlogo.png" style="height: 56px; width: auto;" alt="QR">
            </div>
            <div class="logo-sub">Restricted access — authorised personnel only</div>
        </div>

        <div style="text-align:center;">
            <span class="panel-badge">Admin Panel</span>
        </div>

        {% if error_msg %}
        <div class="error-box" id="err-box">{{ error_msg }}</div>
        <script>setTimeout(function(){ var b=document.getElementById('err-box'); if(b) b.style.display='none'; }, 4000);</script>
        {% endif %}

        <form action="/auth/admin_login" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="admin@example.com" required autofocus>
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-login">Sign in to Dashboard</button>
        </form>

        <hr class="divider">
        <div class="back-link">
            <a href="/">&larr; Back to main site</a>
        </div>
    </div>
</body>
</html>

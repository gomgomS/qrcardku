<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QRkartu - Forgot Password</title>
    <style>
        :root {
            --primary-blue: #EBA81B;
            --primary-hover: #d4941a;
            --text-dark: #E8E5DC;
            --text-muted: #8A8878;
            --border-color: #2C2D25;
            --input-bg: #1E1F18;
            --btn-disabled: #3A3B30;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            display: flex;
            min-height: 100vh;
            background-color: #1E1F18;
            justify-content: center;
            align-items: center;
        }

        .auth-container {
            width: 100%;
            max-width: 400px;
            padding: 40px;
            background: #181914;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
        }

        .header-logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 24px;
            font-weight: 800;
            color: var(--text-dark);
            text-decoration: none;
            margin-bottom: 24px;
        }

        .logo-icon {
            background-color: var(--primary-blue);
            color: white;
            padding: 4px 8px;
            border-radius: 6px;
            font-weight: 800;
        }

        h1 {
            font-size: 24px;
            color: var(--text-dark);
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
            background: #1E1F18;
            color: var(--text-dark);
            transition: border-color 0.2s;
        }

        .input-group input:focus {
            border-color: var(--primary-blue);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background-color: var(--primary-blue);
            color: white;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 24px;
            transition: all 0.2s;
        }

        .btn-submit:hover {
            background-color: var(--primary-hover);
        }

        .back-link {
            font-size: 13px;
            color: var(--text-muted);
            text-align: center;
            display: block;
            text-decoration: none;
        }

        .back-link:hover {
            color: var(--primary-blue);
        }

        .msg {
            color: #10b981;
            background: #d1fae5;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 13px;
            text-align: center;
        }
        
        .error-msg {
            color: #ef4444;
            background: #fee2e2;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 20px;
            font-size: 13px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <a href="/" class="header-logo">
            <span class="logo-icon">QR</span> QRkartu
        </a>
        <h1>Forgot Password</h1>
        <p class="subtitle">Enter your email and we'll send a reset link.</p>

        {% if error_msg %}
        <div class="error-msg">{{ error_msg }}</div>
        {% endif %}
        
        {% if msg %}
        <div class="msg">{{ msg }}</div>
        {% endif %}

        <form action="/forgot-password" method="POST">
            <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />
            <div class="input-group">
                <input type="email" name="email" placeholder="name@email.com" required>
            </div>
            <button type="submit" class="btn-submit">Reset Password</button>
        </form>
        <a href="/login" class="back-link">Back to Log In</a>
    </div>
</body>
</html>
